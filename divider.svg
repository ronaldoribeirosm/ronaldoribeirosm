      <line x1="-16" y1="0" x2="16" y2="0" stroke="#2e1506" stroke-width="2"/>
      <line x1="0" y1="-16" x2="0" y2="16" stroke="#2e1506" stroke-width="2"/>
      <line x1="-11" y1="-11" x2="11" y2="11" stroke="#2e1506" stroke-width="1"/>
      <line x1="11" y1="-11" x2="-11" y2="11" stroke="#2e1506" stroke-width="1"/>
      <circle r="5" fill="#3a1a08"/>
      <circle r="2.5" fill="#c87020"/>
      <animateTransform attributeName="transform" type="rotate"
