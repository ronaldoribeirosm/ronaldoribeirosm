      <line x1="0" y1="-13" x2="0" y2="13" stroke="#2e1506" stroke-width="1.5"/>
      <circle r="4" fill="#2e1506"/>
      <circle r="2" fill="#b5520a"/>
      <animateTransform attributeName="transform" type="rotate"
        from="0" to="-360" dur="12s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- GEAR 3 x=380 CW -->
