<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 54" width="900" height="54">
  <rect width="900" height="54" fill="#080503"/>

  <!-- Main pipe -->
  <rect x="0" y="23" width="900" height="8" rx="4" fill="#1a0a03"/>
  <rect x="0" y="25" width="900" height="4" rx="2" fill="#2e1506"/>

  <!-- GEAR 1 x=100 CW -->
  <g transform="translate(100,27)">
    <g>
      <circle r="18" fill="#0d0802" stroke="#2e1506" stroke-width="5" stroke-dasharray="4.5 2.5"/>
      <circle r="13" fill="none" stroke="#3a1a08" stroke-width="1.5"/>
      <line x1="-13" y1="0" x2="13" y2="0" stroke="#2e1506" stroke-width="1.5"/>
      <line x1="0" y1="-13" x2="0" y2="13" stroke="#2e1506" stroke-width="1.5"/>
      <circle r="4" fill="#2e1506"/>
      <circle r="2" fill="#b5520a"/>
      <animateTransform attributeName="transform" type="rotate"
        from="0" to="360" dur="8s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- GEAR 2 x=240 CCW -->
  <g transform="translate(240,27)">
    <g>
      <circle r="18" fill="#0d0802" stroke="#2e1506" stroke-width="5" stroke-dasharray="4.5 2.5"/>
      <circle r="13" fill="none" stroke="#3a1a08" stroke-width="1.5"/>
