<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 60" width="900" height="60">
  <!-- TRANSPARENTE — sem fundo sólido -->
  <defs>
    <style>
      /* Bolinha de vapor viajando pelo tubo — estilo "cobrinha steampunk" */
      .piston {
        animation: travel 6s linear infinite;
        offset-path: path('M 30,30 L 870,30');
        offset-rotate: 0deg;
      }
      .piston2 {
        animation: travel2 6s linear infinite 3s;
        offset-path: path('M 870,30 L 30,30');
        offset-rotate: 0deg;
      }
      /* Partícula de calor/faísca */
      .spark1 { animation: travel 9s linear infinite 1s; offset-path: path('M 30,30 L 870,30'); }
      .spark2 { animation: travel2 9s linear infinite 4s; offset-path: path('M 870,30 L 30,30'); }

      @keyframes travel {
        0%   { offset-distance: 0%;   opacity: 0; }
        5%   { opacity: 1; }
        95%  { opacity: 1; }
        100% { offset-distance: 100%; opacity: 0; }
      }
      @keyframes travel2 {
        0%   { offset-distance: 0%;   opacity: 0; }
        5%   { opacity: .7; }
        95%  { opacity: .7; }
        100% { offset-distance: 100%; opacity: 0; }
      }

      /* Engrenagens dos lados */
      .gL  { animation: spinCW  8s linear infinite; transform-origin: 30px 30px; }
      .gLs { animation: spinCCW 5s linear infinite; transform-origin: 74px 30px; }
      .gR  { animation: spinCCW 8s linear infinite; transform-origin: 870px 30px; }
      .gRs { animation: spinCW  5s linear infinite; transform-origin: 826px 30px; }
      .gM  { animation: spinCCW 7s linear infinite; transform-origin: 450px 30px; }

      @keyframes spinCW  { to { transform: rotate(360deg);  } }
      @keyframes spinCCW { to { transform: rotate(-360deg); } }

      /* Pressão pulsando no tubo central */
      .pulse { animation: pressurePulse 3s ease-in-out infinite; }
      @keyframes pressurePulse {
        0%,100% { stroke-opacity: .35; }
        50%     { stroke-opacity: .7; }
      }
    </style>
  </defs>

  <!-- TUBO PRINCIPAL — sem fundo, apenas o tubo -->
  <rect x="30" y="22" width="840" height="16" rx="8" fill="#0d0602" stroke="#2e1506" stroke-width="1.5"/>
  <!-- Reflexo metálico no topo do tubo -->
  <rect x="32" y="23" width="836" height="5" rx="2.5" fill="#3a1a08" opacity="0.6"/>
  <!-- Pulso de pressão -->
  <rect x="30" y="22" width="840" height="16" rx="8" fill="none"
    stroke="#b5520a" stroke-width="1" class="pulse"/>

  <!-- Parafusos de reforço ao longo do tubo -->
  <circle cx="160" cy="30" r="4" fill="#1a0a03" stroke="#3a1a08" stroke-width="1"/>
  <circle cx="160" cy="30" r="1.5" fill="#5a2a10"/>
  <circle cx="300" cy="30" r="4" fill="#1a0a03" stroke="#3a1a08" stroke-width="1"/>
  <circle cx="300" cy="30" r="1.5" fill="#5a2a10"/>
  <circle cx="600" cy="30" r="4" fill="#1a0a03" stroke="#3a1a08" stroke-width="1"/>
  <circle cx="600" cy="30" r="1.5" fill="#5a2a10"/>
  <circle cx="740" cy="30" r="4" fill="#1a0a03" stroke="#3a1a08" stroke-width="1"/>
  <circle cx="740" cy="30" r="1.5" fill="#5a2a10"/>

  <!-- ─── ENGRENAGEM ESQUERDA grande ─── -->
  <g class="gL">
    <circle cx="30" cy="30" r="22" fill="#0d0802" stroke="#2e1506" stroke-width="6" stroke-dasharray="5.5 3"/>
    <circle cx="30" cy="30" r="16" fill="none" stroke="#3a1a08" stroke-width="1.5"/>
    <line x1="8"  y1="30" x2="52" y2="30" stroke="#2e1506" stroke-width="2"/>
    <line x1="30" y1="8"  x2="30" y2="52" stroke="#2e1506" stroke-width="2"/>
    <line x1="14" y1="14" x2="46" y2="46" stroke="#2e1506" stroke-width="1"/>
    <line x1="46" y1="14" x2="14" y2="46" stroke="#2e1506" stroke-width="1"/>
    <circle cx="30" cy="30" r="5"  fill="#2e1506"/>
    <circle cx="30" cy="30" r="2.5" fill="#c87020"/>
  </g>

  <!-- ─── ENGRENAGEM ESQUERDA pequena ─── -->
  <g class="gLs">
    <circle cx="74" cy="30" r="16" fill="#0d0802" stroke="#2e1506" stroke-width="4" stroke-dasharray="4 2.5"/>
    <circle cx="74" cy="30" r="11" fill="none" stroke="#3a1a08" stroke-width="1.2"/>
    <line x1="58" y1="30" x2="90" y2="30" stroke="#2e1506" stroke-width="1.5"/>
    <line x1="74" y1="14" x2="74" y2="46" stroke="#2e1506" stroke-width="1.5"/>
    <circle cx="74" cy="30" r="3.5" fill="#2e1506"/>
    <circle cx="74" cy="30" r="1.8" fill="#b5520a"/>
  </g>

  <!-- ─── ENGRENAGEM CENTRO ─── -->
  <g class="gM">
    <circle cx="450" cy="30" r="24" fill="#0d0802" stroke="#4a2810" stroke-width="7" stroke-dasharray="6 3"/>
    <circle cx="450" cy="30" r="17" fill="none" stroke="#3a1a08" stroke-width="2"/>
    <line x1="426" y1="30" x2="474" y2="30" stroke="#2e1506" stroke-width="2"/>
    <line x1="450" y1="6"  x2="450" y2="54" stroke="#2e1506" stroke-width="2"/>
    <line x1="433" y1="13" x2="467" y2="47" stroke="#2e1506" stroke-width="1"/>
    <line x1="467" y1="13" x2="433" y2="47" stroke="#2e1506" stroke-width="1"/>
    <circle cx="450" cy="30" r="6"   fill="#3a1a08"/>
    <circle cx="450" cy="30" r="2.8" fill="#c87020"/>
  </g>

  <!-- ─── ENGRENAGEM DIREITA pequena ─── -->
  <g class="gRs">
    <circle cx="826" cy="30" r="16" fill="#0d0802" stroke="#2e1506" stroke-width="4" stroke-dasharray="4 2.5"/>
    <circle cx="826" cy="30" r="11" fill="none" stroke="#3a1a08" stroke-width="1.2"/>
    <line x1="810" y1="30" x2="842" y2="30" stroke="#2e1506" stroke-width="1.5"/>
    <line x1="826" y1="14" x2="826" y2="46" stroke="#2e1506" stroke-width="1.5"/>
    <circle cx="826" cy="30" r="3.5" fill="#2e1506"/>
    <circle cx="826" cy="30" r="1.8" fill="#b5520a"/>
  </g>

  <!-- ─── ENGRENAGEM DIREITA grande ─── -->
  <g class="gR">
    <circle cx="870" cy="30" r="22" fill="#0d0802" stroke="#2e1506" stroke-width="6" stroke-dasharray="5.5 3"/>
    <circle cx="870" cy="30" r="16" fill="none" stroke="#3a1a08" stroke-width="1.5"/>
    <line x1="848" y1="30" x2="892" y2="30" stroke="#2e1506" stroke-width="2"/>
    <line x1="870" y1="8"  x2="870" y2="52" stroke="#2e1506" stroke-width="2"/>
    <line x1="854" y1="14" x2="886" y2="46" stroke="#2e1506" stroke-width="1"/>
    <line x1="886" y1="14" x2="854" y2="46" stroke="#2e1506" stroke-width="1"/>
    <circle cx="870" cy="30" r="5"   fill="#2e1506"/>
    <circle cx="870" cy="30" r="2.5" fill="#c87020"/>
  </g>

  <!-- ─── PISTÃO animado (cobrinha steampunk) ─── -->
  <!-- Vai da esquerda para direita -->
  <g class="piston">
    <!-- Corpo do pistão -->
    <rect x="-14" y="-5" width="28" height="10" rx="5" fill="#3a1a08" stroke="#b5520a" stroke-width="1.2"/>
    <!-- Janela de pressão (brilha) -->
    <rect x="-8"  y="-2" width="16" height="4"  rx="2" fill="#c87020" opacity="0.7"/>
    <!-- Cauda de vapor -->
    <ellipse cx="-22" cy="0" rx="10" ry="4" fill="#8a6030" opacity="0.3"/>
    <ellipse cx="-34" cy="0" rx="7"  ry="3" fill="#8a6030" opacity="0.15"/>
  </g>

  <!-- Volta da direita para esquerda (mais suave) -->
  <g class="piston2">
    <rect x="-14" y="-4" width="28" height="8" rx="4" fill="#2e1506" stroke="#7a3a10" stroke-width="1"/>
    <rect x="-7"  y="-1.5" width="14" height="3" rx="1.5" fill="#a07020" opacity="0.5"/>
    <ellipse cx="22" cy="0" rx="9" ry="3" fill="#7a5030" opacity="0.2"/>
  </g>

  <!-- Faísca/partícula menor -->
  <g class="spark1">
    <circle cx="0" cy="0" r="2.5" fill="#e8b520" opacity="0.9"/>
    <circle cx="0" cy="0" r="5"   fill="#e8b520" opacity="0.2"/>
  </g>
  <g class="spark2">
    <circle cx="0" cy="0" r="1.8" fill="#ff8c00" opacity="0.7"/>
    <circle cx="0" cy="0" r="4"   fill="#ff8c00" opacity="0.15"/>
  </g>

</svg>
