<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1e0d04"/>
      <stop offset="100%" stop-color="#080503"/>
    </radialGradient>
    <filter id="glowA" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowS" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowG" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .lbl { animation: blink 6s step-end infinite; }
      .ttl { animation: pulse 3s ease-in-out infinite; }
      .dot { animation: dpulse 2s ease-in-out infinite; }
      @keyframes blink { 0%,88%,100%{opacity:1} 90%{opacity:.1} 94%{opacity:1} 97%{opacity:.25} }
      @keyframes pulse { 0%,100%{opacity:.65} 50%{opacity:1} }
      @keyframes dpulse { 0%,100%{opacity:.7;r:4.5} 50%{opacity:1;r:6} }
    </style>
  </defs>

  <!-- BACKGROUND -->
  <rect width="900" height="300" fill="url(#bgGrad)"/>

  <!-- OUTER BORDER -->
  <rect x="3" y="3" width="894" height="294" fill="none" stroke="#4a2810" stroke-width="2"/>
  <rect x="7" y="7" width="886" height="286" fill="none" stroke="#2a1506" stroke-width="1"/>

  <!-- RIVETS -->
  <circle cx="18" cy="18" r="5.5" fill="#7a3a10"/>
  <circle cx="882" cy="18" r="5.5" fill="#7a3a10"/>
  <circle cx="18" cy="282" r="5.5" fill="#7a3a10"/>
  <circle cx="882" cy="282" r="5.5" fill="#7a3a10"/>
  <circle cx="18" cy="18" r="2.5" fill="#c87020"/>
  <circle cx="882" cy="18" r="2.5" fill="#c87020"/>
  <circle cx="18" cy="282" r="2.5" fill="#c87020"/>
  <circle cx="882" cy="282" r="2.5" fill="#c87020"/>

  <!-- TOP / BOTTOM PIPE STRIPS -->
  <rect x="0" y="0" width="900" height="9" fill="#130804"/>
  <rect x="0" y="291" width="900" height="9" fill="#130804"/>
  <rect x="2" y="2" width="896" height="4" rx="2" fill="#3a1a08"/>
  <rect x="2" y="294" width="896" height="4" rx="2" fill="#3a1a08"/>

  <!-- ═══════════════════ GEAR 1 — large left CW ═══════════════════ -->
  <g transform="translate(72,150)">
    <g>
      <circle r="65" fill="#0d0802" stroke="#2e1506" stroke-width="13" stroke-dasharray="13 6"/>
      <circle r="52" fill="none" stroke="#4a2810" stroke-width="2.5"/>
      <circle r="33" fill="none" stroke="#2e1506" stroke-width="8" stroke-dasharray="7 4"/>
      <line x1="-52" y1="0" x2="52" y2="0" stroke="#2e1506" stroke-width="3"/>
      <line x1="0" y1="-52" x2="0" y2="52" stroke="#2e1506" stroke-width="3"/>
      <line x1="-37" y1="-37" x2="37" y2="37" stroke="#2e1506" stroke-width="1.5"/>
      <line x1="37" y1="-37" x2="-37" y2="37" stroke="#2e1506" stroke-width="1.5"/>
      <circle r="10" fill="#3a1a08"/>
      <circle r="5" fill="#b5520a"/>
      <animateTransform attributeName="transform" type="rotate"
        from="0" to="360" dur="22s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- ═══════════════════ GEAR 2 — small top-left CCW ═══════════════ -->
  <g transform="translate(156,82)">
    <g>
      <circle r="35" fill="#0d0802" stroke="#2e1506" stroke-width="8" stroke-dasharray="9 5"/>
      <circle r="27" fill="none" stroke="#4a2810" stroke-width="2"/>
      <circle r="16" fill="none" stroke="#2e1506" stroke-width="5" stroke-dasharray="4.5 2.5"/>
      <line x1="-27" y1="0" x2="27" y2="0" stroke="#2e1506" stroke-width="2.5"/>
      <line x1="0" y1="-27" x2="0" y2="27" stroke="#2e1506" stroke-width="2.5"/>
      <line x1="-19" y1="-19" x2="19" y2="19" stroke="#2e1506" stroke-width="1.5"/>
      <line x1="19" y1="-19" x2="-19" y2="19" stroke="#2e1506" stroke-width="1.5"/>
      <circle r="6" fill="#3a1a08"/>
      <circle r="3" fill="#b5520a"/>
      <animateTransform attributeName="transform" type="rotate"
        from="0" to="-360" dur="14s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- connecting shaft G1–G2 -->
  <rect x="118" y="111" width="25" height="7" rx="3" fill="#2e1506"/>
  <rect x="118" y="113" width="25" height="3" rx="1" fill="#4a2810"/>

  <!-- ═══════════════════ GEAR 3 — large right CCW ══════════════════ -->
  <g transform="translate(828,150)">
    <g>
      <circle r="65" fill="#0d0802" stroke="#2e1506" stroke-width="13" stroke-dasharray="13 6"/>
      <circle r="52" fill="none" stroke="#4a2810" stroke-width="2.5"/>
      <circle r="33" fill="none" stroke="#2e1506" stroke-width="8" stroke-dasharray="7 4"/>
      <line x1="-52" y1="0" x2="52" y2="0" stroke="#2e1506" stroke-width="3"/>
      <line x1="0" y1="-52" x2="0" y2="52" stroke="#2e1506" stroke-width="3"/>
      <line x1="-37" y1="-37" x2="37" y2="37" stroke="#2e1506" stroke-width="1.5"/>
      <line x1="37" y1="-37" x2="-37" y2="37" stroke="#2e1506" stroke-width="1.5"/>
      <circle r="10" fill="#3a1a08"/>
      <circle r="5" fill="#b5520a"/>
      <animateTransform attributeName="transform" type="rotate"
        from="0" to="-360" dur="22s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- ═══════════════════ GEAR 4 — small top-right CW ═════════════ -->
  <g transform="translate(744,82)">
    <g>
      <circle r="35" fill="#0d0802" stroke="#2e1506" stroke-width="8" stroke-dasharray="9 5"/>
      <circle r="27" fill="none" stroke="#4a2810" stroke-width="2"/>
      <circle r="16" fill="none" stroke="#2e1506" stroke-width="5" stroke-dasharray="4.5 2.5"/>
      <line x1="-27" y1="0" x2="27" y2="0" stroke="#2e1506" stroke-width="2.5"/>
      <line x1="0" y1="-27" x2="0" y2="27" stroke="#2e1506" stroke-width="2.5"/>
      <line x1="-19" y1="-19" x2="19" y2="19" stroke="#2e1506" stroke-width="1.5"/>
      <line x1="19" y1="-19" x2="-19" y2="19" stroke="#2e1506" stroke-width="1.5"/>
      <circle r="6" fill="#3a1a08"/>
      <circle r="3" fill="#b5520a"/>
      <animateTransform attributeName="transform" type="rotate"
        from="0" to="360" dur="14s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- connecting shaft G3–G4 -->
  <rect x="757" y="111" width="25" height="7" rx="3" fill="#2e1506"/>
  <rect x="757" y="113" width="25" height="3" rx="1" fill="#4a2810"/>

  <!-- ═══════════════════ CENTER TEXT ═══════════════════════════════ -->

  <!-- Top label — blinking -->
  <text x="450" y="106" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="10" fill="#7a3a10" letter-spacing="6" class="lbl">&#9672; ENGINE INITIALIZED &#9672;</text>

  <!-- Main title with glow -->
  <text x="450" y="163" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="44" font-weight="bold"
    fill="#e8b520" filter="url(#glowA)" class="ttl">THE BRASS WORKSHOP</text>

  <!-- Name -->
  <text x="450" y="197" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="12" fill="#c87820" letter-spacing="5">RONALDO DA SILVA MENDON&#199;A J&#218;NIOR</text>

  <!-- Decorative divider -->
  <line x1="268" y1="212" x2="432" y2="212" stroke="#4a2810" stroke-width="1"/>
  <line x1="468" y1="212" x2="632" y2="212" stroke="#4a2810" stroke-width="1"/>
  <polygon points="447,209 453,209 453,215 447,215" fill="#b5520a"/>
  <circle cx="268" cy="212" r="2" fill="#4a2810"/>
  <circle cx="632" cy="212" r="2" fill="#4a2810"/>

  <!-- Tagline -->
  <text x="450" y="231" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="11" fill="#c8950a" letter-spacing="3">Student &#183; Developer &#183; Systems Builder</text>

  <!-- Status bar -->
  <rect x="312" y="252" width="276" height="26" rx="3" fill="#080503" stroke="#2e1506" stroke-width="1"/>
  <circle cx="330" cy="265" r="4.5" fill="#00cc33" class="dot"/>
  <text x="457" y="269" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="9" fill="#7a5a20" letter-spacing="3">ALL SYSTEMS OPERATIONAL</text>

</svg>
